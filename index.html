<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablas escanear</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>

</head>

<body class="bg-slate-100 min-h-screen p-10">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl p-8">

<h1 class="text-2xl font-bold mb-6 text-slate-700"> Tablas escanear </h1>

<div class="flex flex-wrap gap-3 mb-4">
	<input type="file" id="fileInput" class="border rounded px-3 py-2">
	<button onclick="addRow()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Añadir fila</button>
	<button onclick="deleteRow()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">Eliminar fila</button>
	<button onclick="exportJSON()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">Exportar JSON</button>
</div>

<div class="mb-6">
	<input id="globalSearch" type="text" placeholder="Buscar en toda la tabla..." class="w-full border rounded px-4 py-2">
</div>

<div id="table"></div>
</div>

<script>

let table
let jsonData=[]

const columns=[

	{id:"idClass",title:"idClass"},
	{id:"idRealObject",title:"idRealObject"},
	{id:"idPkField",title:"idPkField"},
	{id:"tipoTransfer",title:"tipoTransfer"},
	{id:"idRealObjectLectura",title:"idRealObjectLectura"}

]

function createTable(){

	table = new Tabulator("#table",{
		ajaxURL:"./configuracion/tablasEscanear.json",
		layout:"fitColumns",
		addRowPos:"top",
		height:"500px",
		pagination:false,
		paginationSize:8,
		selectable:1,
		movableColumns:false,
		columns:columns.map(c=>({
			title:c.title,
			field:c.id,
			editor:"input",
			headerFilter:"input"
		}))
	})

}

/* cargar JSON */

document.getElementById("fileInput").addEventListener("change",function(e){

	const reader=new FileReader()
	reader.onload=function(event){
		const json=JSON.parse(event.target.result)
		jsonData=json.tablasEscanear
		createTable(jsonData)
	}

	reader.readAsText(e.target.files[0])

})

/* buscador global */

document.getElementById("globalSearch").addEventListener("keyup",function(){

	const value=this.value.toLowerCase()

	table.setFilter(function(data){

		return Object.values(data).some(v=>
			String(v).toLowerCase().includes(value)
		)

	})

})

/* añadir fila */

function addRow(){

	table.addRow({

		idClass:"",
		idRealObject:"",
		idPkField:"",
		tipoTransfer:"",
		idRealObjectLectura:""

	})

}

/* eliminar fila */

function deleteRow(){

	const rows=table.getSelectedRows()

	if(rows.length===0){
		alert("Selecciona una fila")
		return
	}

	rows[0].delete()

}

/* exportar */

function exportJSON(){

	const data=table.getData()
	const finalJSON={
		tablasEscanear:data

	}

	const blob=new Blob(
		[JSON.stringify(finalJSON,null,2)],
		{type:"application/json"}
	)

	const a=document.createElement("a")

	a.href=URL.createObjectURL(blob)
	a.download="datos_editados.json"
	a.click()

}

createTable()
	
</script>

</body>
</html>
